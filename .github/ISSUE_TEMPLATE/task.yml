name: 기타 작업
description: 일반 개발 작업 또는 문서 작업을 등록합니다.
title: "chore: "
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        개발, 문서, 설정, 자동화 작업 내용을 작성해 주세요.

  - type: textarea
    id: work
    attributes:
      label: 작업 내용
      description: 어떤 작업을 해야 하나요?
      placeholder: 예) 프론트엔드 협업 자동화 설정
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 필요 이유
      description: 이 작업이 왜 필요한가요?
      placeholder: 예) 팀원이 같은 규칙으로 브랜치와 PR을 관리해야 합니다.
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: 어떤 상태가 되면 완료로 볼 수 있나요?
      placeholder: 예) PR 템플릿, 이슈 템플릿, Actions가 추가됩니다.
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 참고할 화면, 문서, 링크, 제약사항이 있다면 작성해 주세요.
    validations:
      required: false
