name: 기능 추가
description: 새로운 기능 추가를 요청합니다.
title: "feat: "
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        추가하고 싶은 기능과 필요한 이유를 작성해 주세요.

  - type: textarea
    id: work
    attributes:
      label: 작업 내용
      description: 어떤 기능을 추가해야 하나요?
      placeholder: 예) 정책 목록 화면 추가
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 필요 이유
      description: 이 기능이 왜 필요한가요?
      placeholder: 예) 사용자가 등록된 정책을 한눈에 확인해야 합니다.
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: 어떤 상태가 되면 완료로 볼 수 있나요?
      placeholder: 예) 정책 목록 화면에서 정책 카드가 렌더링됩니다.
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 참고할 화면, 문서, 링크, 제약사항이 있다면 작성해 주세요.
      placeholder: 예) 수업 자료, API 명세, 관련 PR 링크
    validations:
      required: false
