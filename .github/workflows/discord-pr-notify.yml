# Discord 알림까지 정상 동작해야 PR 자동화가 통과합니다.
name: Discord PR Notify

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, closed]
  workflow_dispatch:

jobs:
  discord-pr-notify:
    name: Send Discord PR notification
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'PY'
          import json
          import os

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as event_file:
              event = json.load(event_file)

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          action = event.get("action")
          pr = event.get("pull_request", {})

          if event_name == "workflow_dispatch":
              repository = os.environ.get("GITHUB_REPOSITORY", "unknown")
              actor = os.environ.get("GITHUB_ACTOR", "unknown")
              run_id = os.environ.get("GITHUB_RUN_ID", "")
              run_url = f"https://github.com/{repository}/actions/runs/{run_id}"
              payload = {
                  "embeds": [
                      {
                          "title": "::::: Discord 알림 테스트 :::::",
                          "description": "\n".join(
                              [
                                  f"**Repository**: {repository}",
                                  f"**실행자**: {actor}",
                                  f"**Event Type**: {event_name}",
                                  f"**Actions URL**: {run_url}",
                              ]
                          ),
                          "color": 15844367,
                          "url": run_url,
                          "footer": {
                              "text": "Discord webhook test from GitHub Actions."
                          },
                      }
                  ]
              }
              with open("discord-payload.json", "w", encoding="utf-8") as payload_file:
                  json.dump(payload, payload_file, ensure_ascii=False)
              with open("discord-notify.env", "w", encoding="utf-8") as env_file:
                  env_file.write("SHOULD_SEND=true\n")
              raise SystemExit(0)

          if action == "closed" and not pr.get("merged"):
              with open("discord-notify.env", "w", encoding="utf-8") as env_file:
                  env_file.write("SHOULD_SEND=false\n")
              with open("discord-skip-reason.txt", "w", encoding="utf-8") as reason_file:
                  reason_file.write("PR이 merge 없이 closed 되어 Discord 알림을 보내지 않습니다.\n")
              raise SystemExit(0)

          if action != "opened" and not pr.get("merged"):
              with open("discord-notify.env", "w", encoding="utf-8") as env_file:
                  env_file.write("SHOULD_SEND=false\n")
              with open("discord-skip-reason.txt", "w", encoding="utf-8") as reason_file:
                  reason_file.write(f"Discord 알림 대상 PR 이벤트가 아닙니다: {action}\n")
              raise SystemExit(0)

          repository = event.get("repository", {}).get("full_name", "unknown")
          pr_title = pr.get("title", "")
          pr_url = pr.get("html_url", "")
          head_branch = pr.get("head", {}).get("ref", "")
          base_branch = pr.get("base", {}).get("ref", "")
          updated_at = pr.get("updated_at", "")

          if action == "opened":
              notification_title = "PR 생성"
              actor_label = "작성자"
              actor = pr.get("user", {}).get("login", "unknown")
              color = 3066993
          else:
              notification_title = "PR merge 완료"
              actor_label = "merge한 사람"
              actor = (pr.get("merged_by") or pr.get("user") or {}).get("login", "unknown")
              color = 3447003

          description = "\n".join(
              [
                  f"**Repository**: {repository}",
                  f"**PR 제목**: {pr_title}",
                  f"**{actor_label}**: {actor}",
                  f"**브랜치 방향**: {head_branch} -> {base_branch}",
                  f"**Event Time**: {updated_at}",
                  f"**PR URL**: {pr_url}",
              ]
          )

          payload = {
              "embeds": [
                  {
                      "title": f"::::: {notification_title} :::::",
                      "description": description,
                      "color": color,
                      "url": pr_url,
                      "footer": {
                          "text": "Click the link above to view the PR details."
                      },
                  }
              ]
          }

          with open("discord-payload.json", "w", encoding="utf-8") as payload_file:
              json.dump(payload, payload_file, ensure_ascii=False)

          with open("discord-notify.env", "w", encoding="utf-8") as env_file:
              env_file.write("SHOULD_SEND=true\n")
          PY

          source discord-notify.env

          if [ "$SHOULD_SEND" != "true" ]; then
            cat discord-skip-reason.txt
            exit 0
          fi

          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL Secret이 등록되지 않아 Discord 알림을 보낼 수 없습니다."
            exit 1
          fi

          set +e
          http_status=$(curl -sS \
            -o discord-response.txt \
            -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "User-Agent: bistel-mini-2-frontend-github-actions/1.0" \
            -X POST \
            --data @discord-payload.json \
            "$DISCORD_WEBHOOK_URL")
          curl_exit=$?
          set -e

          if [ "$curl_exit" -ne 0 ]; then
            echo "::error::Discord 알림 요청 중 네트워크 오류가 발생했습니다. curl_exit=$curl_exit"
            exit 1
          fi

          if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
            echo "Discord 알림을 보냈습니다. status=$http_status"
            exit 0
          fi

          echo "::error::Discord 알림 전송에 실패했습니다. status=$http_status"
          cat discord-response.txt
          exit 1
