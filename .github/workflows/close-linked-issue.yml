name: Close Linked Issue

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read

jobs:
  close-linked-issue:
    name: Close linked issue
    runs-on: ubuntu-latest

    steps:
      - name: Close issue from PR body
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          if [ "$PR_MERGED" != "true" ]; then
            echo "PR이 merge 없이 closed 되어 연결 이슈를 닫지 않습니다."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.request

          body = os.environ.get("PR_BODY", "")
          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]

          issue_numbers = sorted(
              {
                  int(match)
                  for match in re.findall(
                      r"(?:Closes|Fixes|Resolves)\s+#(\d+)",
                      body,
                      flags=re.IGNORECASE,
                  )
              }
          )

          if not issue_numbers:
              print("::error::PR 본문에서 닫을 이슈 번호를 찾지 못했습니다.")
              print("예시: Closes #2")
              sys.exit(1)

          for issue_number in issue_numbers:
              url = f"https://api.github.com/repos/{repository}/issues/{issue_number}"
              payload = json.dumps(
                  {
                      "state": "closed",
                      "state_reason": "completed",
                  }
              ).encode("utf-8")
              request = urllib.request.Request(
                  url,
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
                  method="PATCH",
              )

              try:
                  with urllib.request.urlopen(request, timeout=10) as response:
                      print(f"이슈 #{issue_number}를 닫았습니다. status={response.status}")
              except urllib.error.HTTPError as error:
                  error_body = error.read().decode("utf-8", errors="replace")
                  print(f"::error::이슈 #{issue_number} 닫기에 실패했습니다. status={error.code}")
                  print(error_body)
                  sys.exit(1)
              except urllib.error.URLError as error:
                  print(f"::error::이슈 #{issue_number} 닫기 요청 중 오류가 발생했습니다: {error}")
                  sys.exit(1)
          PY
